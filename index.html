
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pepper Junction Sauce Discovery Engine</title>
 <style>
 :root {
  --bg: #efe3cc;
  --bg-deep: #e4d2b2;
  --panel: rgba(120, 33, 24, 0.94);
  --panel-strong: rgba(132, 39, 29, 0.98);
  --ticket: #9f3428;
  --ticket-deep: #7f261d;
  --ticket-edge: #d3a15e;
  --ticket-ink: #f7ead7;
  --ticket-muted: #e5c7a0;
  --border: #b7774d;
  --accent: #ffb800;
  --accent-hover: #e0a200;
  --gold: #ffb800;
  --shadow: 0 10px 26px rgba(44, 27, 18, 0.22);
  --shadow-soft: 0 6px 18px rgba(44, 27, 18, 0.14);
}
  * { box-sizing: border-box; }

  body {
    margin: 0;
    color: var(--ticket-ink);
    font-family: Georgia, "Times New Roman", serif;
    background:
      radial-gradient(circle at top, rgba(255,255,255,0.28), transparent 35%),
      linear-gradient(180deg, rgba(239,227,204,0.96), rgba(228,210,178,0.96)),
      repeating-linear-gradient(
        90deg,
        rgba(120, 92, 62, 0.015) 0,
        rgba(120, 92, 62, 0.015) 1px,
        transparent 1px,
        transparent 4px
      );
    min-height: 100vh;
  }

  .pj-wrap {
    max-width: 1120px;
    margin: 0 auto;
    padding: 22px;
  }

  .pj-header {
    margin-bottom: 18px;
    padding: 22px 24px;
    border: 1px solid rgba(163, 119, 72, 0.45);
    border-radius: 18px;
    background:
      linear-gradient(180deg, rgba(255,250,242,0.96), rgba(248,238,220,0.95));
    box-shadow: var(--shadow-soft);
    position: relative;
    overflow: hidden;
  }

  .pj-header::after {
    content: "";
    position: absolute;
    inset: 10px;
    border: 1px solid rgba(180, 137, 88, 0.28);
    border-radius: 12px;
    pointer-events: none;
  }

  .pj-title {
    margin: 0 0 8px;
    font-size: 32px;
    line-height: 1.08;
    letter-spacing: 0.01em;
  }

  .pj-sub {
    margin: 0;
    color: var(--ticket-muted);
    font-size: 15px;
    line-height: 1.55;
    max-width: 760px;
  }

  .pj-layout {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 18px;
    align-items: start;
  }

  .pj-panel,
  .pj-results-head {
    background: var(--panel);
    border: 1px solid rgba(163, 119, 72, 0.4);
    border-radius: 18px;
    box-shadow: var(--shadow-soft);
    position: relative;
    overflow: hidden;
  }

  .pj-panel,
.pj-results-head {
  background:
    radial-gradient(circle at top left, rgba(255,255,255,0.08), transparent 30%),
    linear-gradient(180deg, rgba(159, 52, 40, 0.96), rgba(127, 38, 29, 0.98)),
    repeating-linear-gradient(
      90deg,
      rgba(255,255,255,0.018) 0,
      rgba(255,255,255,0.018) 1px,
      transparent 1px,
      transparent 4px
    );
  border: 1px solid rgba(211, 161, 94, 0.45);
  border-radius: 18px;
  box-shadow: var(--shadow-soft);
  position: relative;
  overflow: hidden;
}
  .pj-panel {
    padding: 18px;
    position: sticky;
    top: 16px;
  }

  .pj-panel h2,
  .pj-results-head h2 {
    margin: 0 0 14px;
    font-size: 21px;
    line-height: 1.2;
  }

  .pj-field {
    margin-bottom: 12px;
  }

  .pj-field label {
    display: block;
    margin-bottom: 6px;
    font-size: 12px;
    font-weight: 700;
    color: var(--ticket-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .pj-field select,
  .pj-field input {
    width: 100%;
    border: 1px solid rgba(174, 132, 84, 0.45);
    border-radius: 10px;
    background: rgba(255,255,255,0.82);
    color: var(--ticket-ink);
    padding: 11px 12px;
    font-size: 14px;
    font-family: inherit;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.55);
  }

  .pj-field select:focus,
  .pj-field input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(151, 47, 31, 0.12);
  }

  .pj-actions {
    display: flex;
    gap: 10px;
    margin-top: 12px;
  }

  .pj-btn {
    border: 1px solid rgba(174, 132, 84, 0.45);
    background: rgba(255,255,255,0.86);
    color: var(--ticket-ink);
    padding: 10px 13px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 700;
    font-family: inherit;
    text-decoration: none;
    display: inline-block;
    transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease;
  }

  .pj-btn:hover {
    transform: translateY(-1px);
    background: #fffdfa;
  }

  .pj-btn.primary {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }

  .pj-btn.primary:hover {
    background: var(--accent-hover);
    border-color: var(--accent-hover);
  }

  .pj-results-head {
    display: flex;
    justify-content: space-between;
    align-items: end;
    gap: 12px;
    padding: 16px 18px;
    margin-bottom: 14px;
  }

  .pj-count {
    color: var(--ticket-muted);
    font-size: 14px;
  }

  .pj-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
    gap: 16px;
    counter-reset: ticket;
  }

  .pj-card {
  counter-increment: ticket;
  border: 1px solid rgba(160, 116, 70, 0.52);
  border-radius: 16px;
  background:
    radial-gradient(circle at top left, rgba(255,255,255,0.28), transparent 28%),
    linear-gradient(180deg, rgba(245,230,200,0.98), rgba(234,212,173,0.98));
  padding: 16px 16px 18px;
  box-shadow: var(--shadow);
  position: relative;
  overflow: hidden;
}

  .pj-card::before {
    content: "";
    position: absolute;
    inset: 9px;
    border: 1px dashed rgba(132, 94, 58, 0.42);
    border-radius: 10px;
    pointer-events: none;
  }

  .pj-card::after {
    content: "Route 401  •  Ticket No. " counter(ticket, decimal-leading-zero);
    position: absolute;
    right: 16px;
    bottom: 10px;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(85, 57, 35, 0.56);
    pointer-events: none;
  }

  .pj-brand {
    color: var(--ticket-ink);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-bottom: 7px;
    position: relative;
    z-index: 1;
  }

 .pj-name {
  margin: 0 0 10px;
  font-size: 21px;
  line-height: 1.25;
  color: var(--accent);
  position: relative;
  padding-right: 92px;
}

 .pj-name::after {
  content: "";
  position: absolute;
  width: 92px;
  height: 92px;
  top: -40px;
  right: -12px;
  background: url("assets/PJ-logo.png") no-repeat center;
  background-size: contain;
   pointer-events: none;
}
   .pj-meta {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 10px;
    margin-bottom: 2px;
    position: relative;
    z-index: 1;
  }

  .pj-pill {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    color: var(--ticket-ink);
    background: rgba(255, 248, 236, 0.72);
    border: 1px solid rgba(174, 132, 84, 0.42);
    border-radius: 999px;
    padding: 5px 9px;
    margin: 0 6px 6px 0;
    position: relative;
    z-index: 1;
  }

  .pj-section {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px dashed rgba(143, 108, 74, 0.38);
    position: relative;
    z-index: 1;
  }

  .pj-k {
    display: block;
    font-size: 11px;
    color: var(--ticket-muted);
    margin-bottom: 4px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.12em;
  }

  .pj-v {
    font-size: 14px;
    line-height: 1.5;
    color: var(--ticket-ink);
  }

  .pj-card-actions {
    margin-top: 14px;
    position: relative;
    z-index: 1;
    padding-bottom: 12px;
  }

  .pj-card-actions .pj-btn {
    width: 100%;
    text-align: center;
  }

  .pj-empty {
    border: 1px dashed rgba(160, 116, 70, 0.52);
    border-radius: 16px;
    background: var(--panel-strong);
    padding: 24px;
    text-align: center;
    color: var(--ticket-muted);
    box-shadow: var(--shadow-soft);
  }

  @media (max-width: 860px) {
    .pj-layout {
      grid-template-columns: 1fr;
    }

    .pj-panel {
      position: static;
    }
  }

  @media (max-width: 560px) {
    .pj-wrap {
      padding: 14px;
    }

    .pj-header,
    .pj-panel,
    .pj-results-head,
    .pj-card {
      border-radius: 14px;
    }

    .pj-title {
      font-size: 27px;
    }

    .pj-name {
      font-size: 19px;
    }

    .pj-meta {
      grid-template-columns: 1fr;
    }

    .pj-actions {
      flex-direction: column;
    }
  }
</style>
</head>

    <div class="pj-layout">

        <div class="pj-field">

          </select>
        </div>

        <div class="pj-field">
          <label for="pj-pepper-type">Pepper Type</label>
          <select id="pj-pepper-type">
            <option value="">All</option>
            <option value="Aji Lemon Drop">Aji Lemon Drop</option><option value="Apollo">Apollo</option><option value="Cayenne">Cayenne</option><option value="Chili Peppers">Chili Peppers</option><option value="Chipotle">Chipotle</option><option value="Ghost Pepper">Ghost Pepper</option><option value="Habanero">Habanero</option><option value="Jalapeño">Jalapeño</option><option value="Paprika">Paprika</option><option value="Pepper X">Pepper X</option><option value="Reaper">Reaper</option><option value="Red Pepper">Red Pepper</option><option value="Scorpion">Scorpion</option><option value="Scotch Bonnet">Scotch Bonnet</option><option value="Spices">Spices</option><option value="none">none</option>
          </select>
        </div>

        <div class="pj-field">
          <label for="pj-heat-curve">Heat Curve</label>
          <select id="pj-heat-curve">
            <option value="">All</option>
            <option value="Delayed Escalation">Delayed Escalation</option><option value="Immediate Hit">Immediate Hit</option><option value="Steady Build">Steady Build</option>
          </select>
        </div>

        <div class="pj-field">
          <label for="pj-heat-finish">Heat Finish</label>
          <select id="pj-heat-finish">
            <option value="">All</option>
            <option value="Flash Fade">Flash Fade</option><option value="Hangs Briefly">Hangs Briefly</option><option value="It Burns">It Burns</option><option value="No Hang">No Hang</option><option value="Say Goodnight">Say Goodnight</option>
          </select>
        </div>

        <div class="pj-actions">
          <button class="pj-btn primary" id="pj-apply" type="button">Apply Filters</button>
          <button class="pj-btn" id="pj-reset" type="button">Reset</button>
        </div>
      </aside>

      <main>
        <div class="pj-results-head">
          <div>
            <h2>Matching Sauces</h2>
            <div class="pj-count" id="pj-count"></div>
          </div>
        </div>

        <div id="pj-results" class="pj-grid"></div>
      </main>
    </div>
  </div>

    const PRODUCT_URL_COL = "Product URL";

    const els = {
      search: document.getElementById('pj-search'),
      category: document.getElementById('pj-category'),
      heatTier: document.getElementById('pj-heat-tier'),
      foodStyle: document.getElementById('pj-food-style'),
      pepperType: document.getElementById('pj-pepper-type'),
      heatCurve: document.getElementById('pj-heat-curve'),
      heatFinish: document.getElementById('pj-heat-finish'),
      apply: document.getElementById('pj-apply'),
      reset: document.getElementById('pj-reset'),
      results: document.getElementById('pj-results'),
      count: document.getElementById('pj-count')
    };

    function matches(record) {
      const q = els.search.value.trim().toLowerCase();
      const category = els.category.value;
      const heatTier = els.heatTier.value;
      const foodStyle = els.foodStyle.value;
      const pepperType = els.pepperType.value;
      const heatCurve = els.heatCurve.value;
      const heatFinish = els.heatFinish.value;

      if (category && record["Category"] !== category) return false;
      if (heatTier && record["Heat Tier"] !== heatTier) return false;
      if (foodStyle && record["Food Style"] !== foodStyle) return false;
      if (pepperType && record["Pepper Type"] !== pepperType) return false;
      if (heatCurve && record["Heat Curve"] !== heatCurve) return false;
      if (heatFinish && record["Heat Finish"] !== heatFinish) return false;

      if (q) {
        const searchable = [
          record["Brand"],
          record["Product Name"],
          record["Category"],
          record["Food Style"],
          record["Pepper Type"],
          record["Heat Tier"],
          record["Heat Curve"],
          record["Heat Finish"],
          record["Primary Flavor Notes"],
          record["Best Food Pairings"]
        ].join(" | ").toLowerCase();

        if (!searchable.includes(q)) return false;
      }

      return true;
    }

function getRelevanceScore(record, query) {
  let score = 0;

  const q = query.toLowerCase().trim();
  const singularQ = q.endsWith("s") ? q.slice(0, -1) : q;

  const productName = (record["Product Name"] || "").toLowerCase();
  const pairings = (record["Best Food Pairings"] || "").toLowerCase();
  const flavorNotes = (record["Primary Flavor Notes"] || "").toLowerCase();
  const pepperType = (record["Pepper Type"] || "").toLowerCase();
  const foodStyle = (record["Food Style"] || "").toLowerCase();
  const category = (record["Category"] || "").toLowerCase();

  function includesQuery(text) {
    return text.includes(q) || text.includes(singularQ);
  }

  if (includesQuery(productName)) score += 12;
  if (includesQuery(pairings)) score += 15;
  if (includesQuery(foodStyle)) score += 14;
  if (includesQuery(flavorNotes)) score += 8;
  if (includesQuery(pepperType)) score += 5;
  if (includesQuery(category)) score += 4;

  return score;
}
    function pill(text) {
      if (!text) return '';
      return `<span class="pj-pill">${escapeHtml(text)}</span>`;
    }

    function escapeHtml(s) {
      return String(s || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function card(record) {
      const productUrl = PRODUCT_URL_COL ? String(record[PRODUCT_URL_COL] || '').trim() : '';
      const action = productUrl
        ? `<div class="pj-card-actions"><a class="pj-btn primary" href="${escapeHtml(productUrl)}" target="_blank" rel="noopener noreferrer">View Sauce</a></div>`
        : '';

      return `
        <article class="pj-card">
          <div class="pj-brand">${escapeHtml(record["Brand"])}</div>
          <h3 class="pj-name">${escapeHtml(record["Product Name"])}</h3>

          <div>
            ${pill(record["Category"])}
            ${pill(record["Food Style"])}
            ${pill(record["Pepper Type"])}
            ${pill(record["Heat Tier"])}
          </div>

          <div class="pj-meta">
            <div class="pj-section">
              <span class="pj-k">Heat Level</span>
              <div class="pj-v">${escapeHtml(record["Heat Level"])}</div>
            </div>
            <div class="pj-section">
              <span class="pj-k">Heat Curve</span>
              <div class="pj-v">${escapeHtml(record["Heat Curve"])}</div>
            </div>
          </div>

          <div class="pj-section">
            <span class="pj-k">Heat Finish</span>
            <div class="pj-v">${escapeHtml(record["Heat Finish"])}</div>
          </div>

          <div class="pj-section">
            <span class="pj-k">Flavor Notes</span>
            <div class="pj-v">${escapeHtml(record["Primary Flavor Notes"])}</div>
          </div>

          <div class="pj-section">
            <span class="pj-k">Best Food Pairings</span>
            <div class="pj-v">${escapeHtml(record["Best Food Pairings"])}</div>
          </div>

          ${action}
        </article>
      `;
    }

    function render() {
      const filtered = PJ_DATA.filter(matches);
      els.count.textContent = `${filtered.length} product${filtered.length === 1 ? '' : 's'} found`;

      if (!filtered.length) {
        els.results.innerHTML = `
          <div class="pj-empty">
            <strong>No matches found.</strong><br><br>
            Try widening the filters or searching by food, flavor, or pepper type.
          </div>
        `;
        return;
      }

   filtered.sort((a, b) => {
  const query = els.search.value.trim().toLowerCase();

  if (query) {
    const scoreA = getRelevanceScore(a, query);
    const scoreB = getRelevanceScore(b, query);

    if (scoreA !== scoreB) return scoreB - scoreA;
  }

  const heatA = Number(a["Heat Level"] || 0);
  const heatB = Number(b["Heat Level"] || 0);

  if (heatA !== heatB) return heatA - heatB;

  return String(a["Product Name"] || '').localeCompare(String(b["Product Name"] || ''));
});
      els.results.innerHTML = filtered.map(card).join('');
    }

    els.apply.addEventListener('click', render);
    els.search.addEventListener('input', render);
    [els.category, els.heatTier, els.foodStyle, els.pepperType, els.heatCurve, els.heatFinish].forEach(el => el.addEventListener('change', render));
    els.reset.addEventListener('click', () => {
      els.search.value = '';
      els.category.value = '';
      els.heatTier.value = '';
      els.foodStyle.value = '';
      els.pepperType.value = '';
      els.heatCurve.value = '';
      els.heatFinish.value = '';
      render();
    });

    render();
  </script>
